name: build-and-deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus2
  RG: rg-discharge
  ACR_NAME: crdtprodeus2001
  IMAGE_NAME: discharge-translation
  CONTAINER_APP: ca-dt-web-prod-eus2-001

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: az group create -n $RG -l $AZURE_LOCATION

      - name: Deploy base infra (without container image)
        run: |
          az deployment group create \
            -g $RG \
            -f infra/main.bicep \
            -p infra/main.parameters.json \
            -p containerImage='' appPassword=${{ secrets.APP_PASSWORD }}

      - name: ACR login
        run: az acr login -n $ACR_NAME

      - name: Build & push image
        run: |
          IMAGE=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy container app with new image
        run: |
          az deployment group create \
            -g $RG \
            -f infra/main.bicep \
            -p infra/main.parameters.json \
            -p containerImage=$IMAGE appPassword=${{ secrets.APP_PASSWORD }}
